name: macOS build

on: [push]

jobs:
  build:

    runs-on: macos-15-intel
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v2

    - name: install dependencies
      run: HOMEBREW_NO_AUTO_UPDATE=1 brew install freetype

    - name: cmake
      run: cmake -DCMAKE_CXX_FLAGS=-Werror .

    - name: make
      run: make
